# F1TENTH Object Detection Configuration
#
# This configuration file contains parameters for the LiDAR clustering node
# used in F1TENTH autonomous racing object detection. These parameters
# control the behavior of the clustering algorithm and topic assignments.
#
# Author: F1TENTH Object Detection Team
# License: MIT

lidar_cluster_node:
  ros__parameters:
    cluster_pub_topic: "/clusters"
    scan_sub_topic: "/scan"
    laser_frame: "ego_racecar/laser"
    base_frame: "ego_racecar/base_link"
    map_frame: "map"
    map_sub_topic: "/map"
    outlier_diff_threshold: 0.15
    angle_thresh: 45.0 
    min_cluster_size: 0.15
    max_cluster_size: 0.35
    eps: 0.05
    min_samples: 4
    max_distance: 5.0
    safety_radius: 0.3
    occupied_threshold: 50
    
    # Object Tracking Parameters
    tracking_enabled: true
    max_tracking_distance: 0.5    # Max distance to associate detection with tracked object (meters)
    max_lost_frames: 10           # Max frames before removing lost track
    tracked_objects_topic: "/tracked_objects"
